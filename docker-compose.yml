name: casedd

services:
  casedd:
    build: .
    restart: unless-stopped
    ports:
      - "${CASEDD_WS_PORT:-8765}:8765"
      - "${CASEDD_HTTP_PORT:-8080}:8080"
    volumes:
      # Mount templates and assets for easy editing without rebuild
      - ./templates:/app/templates:ro
      - ./assets:/app/assets:ro
      # Persist logs
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      # Framebuffer is unavailable inside the container
      - CASEDD_NO_FB=1
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/image')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
